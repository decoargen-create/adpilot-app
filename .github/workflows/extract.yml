name: Extract source files

on: push

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for archive
        id: check
        run: |
          if [ -f remaining_files.tar.gz ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi
      - name: Extract and commit
        if: steps.check.outputs.found == 'true'
        run: |
          tar xzf remaining_files.tar.gz
          rm remaining_files.tar.gz
          rm -rf .github
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Extract remaining source files from archive"
          git push
